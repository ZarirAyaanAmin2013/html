<!DOCTYPE html>
<html>
  <head>
    <title>Form</title>
    <style>
      body {
  font-family: Arial, sans-serif;
  background-color: lightgrey;
  margin: 0;
  padding: 0;
}

.form-container {
  max-width: 450px;
  margin: 50px auto;
  background-color: white;
  padding: 30px;
  border-radius: 8px;
}

h2 {
  text-align: center;
  margin-bottom: 25px;
}

label {
  display: block;
  margin-top: 15px;
  font-weight: bold;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  font-size: 15px;
  border-radius: 5px;
  border: 2px solid lightblue;
  outline: none;
  transition: border-color 0.3;
}

/* hover effect */
input:hover, textarea:hover {
  border-color: slategrey;
}

/* focus effect */
input:focus, textarea:focus {
  border-color: blue;
  background-color: white;
}

/* invalid input */
input:invalid, textarea:invalid {
  border-color: crimson;
}

/* valid input */
input:valid, textarea:valid {
  border-color: green;
}

button {
  width: 100%;
  margin-top: 25px;
  padding: 12px;
  background-color: blue;
  color: white;
  border: none;
  border-radius: 16px;
  cursor: pointer;
}
    </style>
  </head>
  <body>
    <div class="form-container">
      <h2>sign up</h2>
      <form>
        <label for="name">full name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
        <label for="email">email</label>
        <input type="email" id="email" placeholder="example@email.com" required>
        <label for="password">password</label>
        <input type="password" id="password" placeholder="minimum 6 characters, must include numbers and high capital letters" pattern=".{6,}" required>
        <label for="message">message</label>
        <textarea id="message" rows="4" placeholder="write your message" required></textarea>
        <button type="submit">submit your message</button>
      </form>
      <p class="note"> feilds turn green when valid and red when invalid</p>
    </div>
  </body>
</html>
